services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_APP_URL=https://${APP_SLUG}.inovastudio.tech
    # No Coolify, o domínio é configurado na aba "Domains", 
    # mas esta estrutura garante que o app saiba sua própria URL.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
